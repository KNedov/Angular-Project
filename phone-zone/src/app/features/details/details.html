@if(loading){
<app-loader></app-loader>
}@else {
  <div class="container">
  <!-- Phone Details Card -->
  <div class="phone-card">
    <div class="phone-header">
      <h1 class="phone-title">{{phone.phoneName}}</h1>
      @if(isNotPhoneOwner){
        <div class="actions">
        <button class="action-btn">
          <i class="material-icons">edit</i>
        </button>
        <button class="action-btn delete">
          <i class="material-icons">delete</i>
        </button>
      </div>
      }
    </div>

    <app-phone-content [phone]="phone" ></app-phone-content>
  </div>

  <app-comment-section 
  [comments]="phone.comments"
  [isNotPhoneOwner]="isNotPhoneOwner"
  [isNotCommentOwner]="isNotCommentOwner"
   ></app-comment-section>
  
</div>
}
