<main class="main-content">
  <div class="container">
    <div class="home-intro">
      <h2>Find Your Next Favorite Phone</h2>
      <p>
        Start with these recently added models or search for your perfect match
      </p>
    </div>

    @if(phones.length>0){
    <div class="phones-grid" id="phones-container">
      @for(phone of phones ; track phone._id){
      <app-phone-card [phone]="phone"></app-phone-card>
      }
    </div>
    }@else{
       <!-- No Phones Message (hidden by default) -->
    <div class="no-phones-message" id="no-phones-message">
      <i class="fas fa-mobile-alt"></i>
      <h2>No Phones Available</h2>
      <p>There are currently no phones to display.</p>
      <a href="#" class="btn primary-btn">Add New Phone</a>
    </div>
    }
   
  </div>
</main>
